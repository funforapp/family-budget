<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Supabase Test</title>
</head>
<body style="font-family:sans-serif;padding:20px;background:#0d1117;color:#e6edf3;">
<h2>Supabase Connection Test</h2>
<div id="status" style="padding:12px;background:#1c2128;border-radius:8px;margin-top:16px;">Testing...</div>
<div id="log" style="padding:12px;background:#1c2128;border-radius:8px;margin-top:10px;font-size:12px;color:#8892b0;"></div>

<script>
var el = document.getElementById('status');
var log = document.getElementById('log');

function addLog(msg){ log.innerHTML += msg + '<br>'; }

var URL = 'https://umzcrmwirxckkuucdrbq.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtemNybXdpcnhja2t1dWNkcmJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODcyMTksImV4cCI6MjA4OTY2MzIxOX0.0ERUtGbi33ffcdMFblyR9e5N-b_YK40hAUTyZ0WeS4o';

// Test using raw fetch instead of Supabase library
async function test(){
  addLog('Browser: ' + navigator.userAgent.slice(0,80));
  addLog('Testing raw fetch to Supabase REST API...');

  try {
    var response = await fetch(URL + '/rest/v1/expenses?select=id&limit=1', {
      headers: {
        'apikey': KEY,
        'Authorization': 'Bearer ' + KEY
      }
    });
    addLog('HTTP status: ' + response.status);
    var text = await response.text();
    addLog('Response: ' + text.slice(0,200));
    if(response.ok){
      el.innerHTML = '✓ SUCCESS! Supabase REST API works directly.';
      el.style.color = '#3fb950';
    } else {
      el.innerHTML = 'FAIL: HTTP ' + response.status;
      el.style.color = '#f85149';
    }
  } catch(e){
    el.innerHTML = 'FETCH ERROR: ' + e.message;
    el.style.color = '#f85149';
    addLog('Error: ' + e.toString());
  }
}

window.addEventListener('load', test);
</script>
</body>
</html>
