<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Supabase Test</title>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
</head>
<body style="font-family:sans-serif;padding:20px;background:#0d1117;color:#e6edf3;">
<h2>Supabase Connection Test</h2>
<div id="status" style="padding:12px;background:#1c2128;border-radius:8px;margin-top:16px;">Testing...</div>

<script>
const URL = 'https://umzcrmwirxckkuucdrbq.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtemNybXdpcnhja2t1dWNkcmJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODcyMTksImV4cCI6MjA4OTY2MzIxOX0.0ERUtGbi33ffcdMFblyR9e5N-b_YK40hAUTyZ0WeS4o';
const el = document.getElementById('status');

async function test(){
  try {
    el.textContent = 'Step 1: Checking if supabase library loaded...';
    if(typeof supabase === 'undefined'){
      el.textContent = 'FAIL: supabase library not loaded!';
      el.style.color = '#f85149';
      return;
    }
    el.textContent = 'Step 2: Creating client...';
    const sb = supabase.createClient(URL, KEY);
    el.textContent = 'Step 3: Querying expenses table...';
    const {data, error} = await sb.from('expenses').select('id').limit(1);
    if(error){
      el.innerHTML = 'FAIL: ' + error.message + '<br><small>' + JSON.stringify(error) + '</small>';
      el.style.color = '#f85149';
    } else {
      el.innerHTML = '✓ SUCCESS! Got ' + (data ? data.length : 0) + ' rows.<br><small>Supabase is working correctly.</small>';
      el.style.color = '#3fb950';
    }
  } catch(e){
    el.innerHTML = 'EXCEPTION: ' + e.message + '<br><small>' + e.toString() + '</small>';
    el.style.color = '#f85149';
  }
}

window.addEventListener('load', test);
</script>
</body>
</html>
